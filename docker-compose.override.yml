# Local-dev only — `docker compose` auto-merges this with docker-compose.yml.
# Dokploy deploys the base file alone, so none of this leaks to prod.
#
# What it adds:
#   - Host port mappings so you can hit Postgres / web directly from the host.
#   - A Caddy reverse-proxy on :80 for `http://localhost` access.
# Nothing in this file is read by Dokploy.

services:
  postgres:
    ports:
      # Exposed so `bun run db:push` and host-side dev tooling can connect.
      - "11112:5432"

  web:
    ports:
      # Direct host access for local dev — bypasses Caddy.
      - "3000:3000"

  caddy:
    image: caddy:2-alpine
    container_name: jupietre-caddy
    restart: unless-stopped
    depends_on:
      - web
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - jupietre-caddy-data:/data
      - jupietre-caddy-config:/config

volumes:
  jupietre-caddy-data:
  jupietre-caddy-config:
