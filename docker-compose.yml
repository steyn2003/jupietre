# Production / Dokploy compose. Local-dev port bindings + Caddy live in
# docker-compose.override.yml (auto-merged by `docker compose` locally,
# ignored by Dokploy which deploys this file as-is).
#
# In Dokploy:
#   - Traefik (Dokploy's built-in reverse proxy) handles TLS + routing.
#     Configure the route → web:3000 in the Dokploy UI; no host ports needed.
#   - Set env vars (POSTGRES_URL is overridden by env_file/.env, etc.) in
#     the Dokploy "Environment" panel rather than committing them.

services:
  postgres:
    image: postgres:17-alpine
    container_name: jupietre-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jupietre}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-jupietre}
      POSTGRES_DB: ${POSTGRES_DB:-jupietre}
    volumes:
      - jupietre-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jupietre} -d ${POSTGRES_DB:-jupietre}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: jupietre-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    expose:
      - "3000"
    environment:
      # Inside the compose network, talk to postgres by service name.
      POSTGRES_URL: postgres://${POSTGRES_USER:-jupietre}:${POSTGRES_PASSWORD:-jupietre}@postgres:5432/${POSTGRES_DB:-jupietre}
      REPOS_BASE_DIR: /data/repos
      # Where per-session worktrees + Jupietre-managed state live.
      DATA_DIR: /app/data
    volumes:
      - jupietre-repos:/data/repos
      - jupietre-data:/app/data
      - jupietre-gh-config:/home/app/.config/gh

volumes:
  jupietre-postgres-data:
  jupietre-repos:
  jupietre-data:
  jupietre-gh-config:
