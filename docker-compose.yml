services:
  pm:
    build: .
    container_name: agent-pm
    restart: unless-stopped
    env_file: .env
    environment:
      AGENT_ROLE: pm
    volumes:
      - repo-data:/data
      - ${CLAUDE_CREDENTIALS:-~/.claude/.credentials.json}:/home/node/.claude/.credentials.json:ro

  engineer:
    build: .
    container_name: agent-engineer
    restart: unless-stopped
    env_file: .env
    environment:
      AGENT_ROLE: engineer
    volumes:
      - repo-data:/data
      - ${CLAUDE_CREDENTIALS:-~/.claude/.credentials.json}:/home/node/.claude/.credentials.json:ro

  tester:
    build: .
    container_name: agent-tester
    restart: unless-stopped
    env_file: .env
    environment:
      AGENT_ROLE: tester
    volumes:
      - repo-data:/data
      - ${CLAUDE_CREDENTIALS:-~/.claude/.credentials.json}:/home/node/.claude/.credentials.json:ro

volumes:
  repo-data:
